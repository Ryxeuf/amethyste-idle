# Prometheus alerting rules for Amethyste-Idle

groups:
  - name: amethyste_alerts
    rules:
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(amethyste_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency (p95 > 2s)"
          description: "95th percentile latency is {{ $value }}s over the last 5 minutes."

      - alert: HighErrorRate
        expr: rate(amethyste_http_errors_total[5m]) * 60 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate (> 5 errors/min)"
          description: "Error rate is {{ $value }} errors/min."

      - alert: HealthCheckFailing
        expr: probe_success{job="amethyste_health"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Health check endpoint is failing"
          description: "The /health endpoint has been returning errors for 3+ minutes."

      - alert: NoPlayersOnline
        expr: amethyste_players_online == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "No players online for 30 minutes"
          description: "This may be normal during off-peak hours."

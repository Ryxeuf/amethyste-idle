# Sets d'équipement — bonus progressifs quand plusieurs pièces du même set sont portées
# Bonus types : damage, heal, hit, critical, life, protection

App\Entity\Game\EquipmentSet:
  # === Set du Gardien (cuir tier 1) — défense & vie ===
  set_guardian:
    slug: 'guardian'
    name: "Set du Gardien"
    description: "L'équipement traditionnel des gardiens du royaume. Porter plusieurs pièces renforce la résistance du porteur."
    name_translations:
      en: "Guardian Set"
    description_translations:
      en: "The traditional gear of the kingdom's guardians. Wearing several pieces toughens the bearer's resistance."
    bonuses:
      - { required_pieces: 2, bonus_type: 'protection', bonus_value: 3 }
      - { required_pieces: 3, bonus_type: 'life', bonus_value: 15 }
      - { required_pieces: 4, bonus_type: 'hit', bonus_value: 5 }
    items:
      - '@leather_armor'
      - '@leather_hat'
      - '@leather_boots'
      - '@leather_gloves'
      - '@leather_pants'
      - '@leather_shoulders'

  # === Set de l'Ombre (offensif) — dégâts & critique ===
  set_shadow:
    slug: 'shadow'
    name: "Set de l'Ombre"
    description: "Forgé dans les ténèbres, cet équipement amplifie la puissance destructrice de son porteur."
    name_translations:
      en: "Shadow Set"
    description_translations:
      en: "Forged in the darkness, this gear amplifies the bearer's destructive might."
    bonuses:
      - { required_pieces: 2, bonus_type: 'damage', bonus_value: 5 }
      - { required_pieces: 3, bonus_type: 'critical', bonus_value: 8 }
    items:
      - '@short_sword'
      - '@leather_belt'
      - '@bronze_ring'

  # === Set du Veilleur (équilibre) — hit & soin ===
  set_watcher:
    slug: 'watcher'
    name: "Set du Veilleur"
    description: "L'équipement des veilleurs de nuit, conçu pour la polyvalence et l'endurance au combat."
    name_translations:
      en: "Watcher Set"
    description_translations:
      en: "The gear of night watchers, designed for versatility and combat endurance."
    bonuses:
      - { required_pieces: 2, bonus_type: 'hit', bonus_value: 4 }
      - { required_pieces: 3, bonus_type: 'heal', bonus_value: 10 }
    items:
      - '@silver_amulet'
      - '@iron_shield'
      - '@long_sword'

  # === Set Tier 2 — Traqueur (Cuir renforcé) — esquive & critique ===
  set_tracker:
    slug: 'tracker'
    name: "Set du Traqueur"
    description: "Taillé dans le cuir renforcé des bêtes les plus coriaces. Porter plusieurs pièces affûte les réflexes du porteur."
    name_translations:
      en: "Tracker Set"
    description_translations:
      en: "Cut from the hardened leather of the toughest beasts. Wearing several pieces sharpens the bearer's reflexes."
    bonuses:
      - { required_pieces: 2, bonus_type: 'hit', bonus_value: 5 }
      - { required_pieces: 4, bonus_type: 'critical', bonus_value: 8 }
      - { required_pieces: 6, bonus_type: 'life', bonus_value: 20 }
    items:
      - '@hardened_vest'
      - '@hardened_boots'
      - '@hardened_gloves'
      - '@hardened_belt'
      - '@hardened_shoulders'
      - '@hardened_pants'

  # === Set Tier 2 — Forgefer (Fer, non-élémentaire) — protection & vie ===
  set_ironforge:
    slug: 'ironforge'
    name: "Set du Forgefer"
    description: "L'armure standard des chevaliers, forgée dans le meilleur fer du royaume. Porter plusieurs pièces renforce la défense."
    name_translations:
      en: "Ironforge Set"
    description_translations:
      en: "The standard armor of knights, forged from the kingdom's finest iron. Wearing several pieces reinforces defense."
    bonuses:
      - { required_pieces: 2, bonus_type: 'protection', bonus_value: 4 }
      - { required_pieces: 4, bonus_type: 'life', bonus_value: 20 }
      - { required_pieces: 6, bonus_type: 'hit', bonus_value: 8 }
    items:
      - '@iron_helmet'
      - '@iron_chestplate'
      - '@iron_greaves'
      - '@iron_boots'
      - '@iron_gauntlets'
      - '@iron_pauldrons'
      - '@iron_belt_reinforced'

  # === Set Tier 3 — Mithril (non-élémentaire) — protection & polyvalence ===
  set_mithril:
    slug: 'mithril'
    name: "Set de Mithril"
    description: "Forgé dans le mithril, un métal aussi rare que légendaire. La protection ultime pour les aventuriers d'élite."
    name_translations:
      en: "Mithril Set"
    description_translations:
      en: "Forged from mithril, a metal as rare as it is legendary. The ultimate protection for elite adventurers."
    bonuses:
      - { required_pieces: 2, bonus_type: 'protection', bonus_value: 8 }
      - { required_pieces: 4, bonus_type: 'life', bonus_value: 30 }
      - { required_pieces: 6, bonus_type: 'damage', bonus_value: 10 }
    items:
      - '@mithril_helm'
      - '@mithril_cuirass'
      - '@mithril_greaves'
      - '@mithril_sabatons'
      - '@mithril_gauntlets'
      - '@mithril_pauldrons'
      - '@mithril_girdle'

  # === Set Tier 3 — Acier Runique (Métal) — dégâts & protection ===
  set_runic_steel:
    slug: 'runic-steel'
    name: "Set d'Acier Runique"
    description: "Forgé dans un alliage oublié, cet équipement renforce à la fois l'attaque et la défense de son porteur grâce à des runes métalliques ancestrales."
    name_translations:
      en: "Runic Steel Set"
    description_translations:
      en: "Forged from a forgotten alloy, this gear strengthens both the attack and defense of its bearer thanks to ancient metallic runes."
    bonuses:
      - { required_pieces: 2, bonus_type: 'protection', bonus_value: 5 }
      - { required_pieces: 4, bonus_type: 'damage', bonus_value: 8 }
      - { required_pieces: 6, bonus_type: 'critical', bonus_value: 10 }
    items:
      - '@t3_metal_sword'
      - '@t3_metal_shield'
      - '@t3_metal_helmet'
      - '@t3_metal_chest'
      - '@t3_metal_legs'
      - '@t3_metal_boots'
      - '@t3_metal_gloves'

  # === Set Tier 3 — Prédateur Sauvage (Bête) — dégâts & critique ===
  set_savage_predator:
    slug: 'savage-predator'
    name: "Set du Prédateur Sauvage"
    description: "Taillé dans les dépouilles des bêtes les plus féroces, cet équipement déchaîne l'instinct primal de son porteur."
    name_translations:
      en: "Savage Predator Set"
    description_translations:
      en: "Cut from the hides of the fiercest beasts, this gear unleashes the bearer's primal instinct."
    bonuses:
      - { required_pieces: 2, bonus_type: 'damage', bonus_value: 6 }
      - { required_pieces: 4, bonus_type: 'critical', bonus_value: 12 }
      - { required_pieces: 6, bonus_type: 'life', bonus_value: 25 }
    items:
      - '@t3_beast_sword'
      - '@t3_beast_shield'
      - '@t3_beast_helmet'
      - '@t3_beast_chest'
      - '@t3_beast_legs'
      - '@t3_beast_boots'
      - '@t3_beast_gloves'

  # === Set Tier 3 — Aurore Sacrée (Lumière) — soin & précision ===
  set_sacred_dawn:
    slug: 'sacred-dawn'
    name: "Set de l'Aurore Sacrée"
    description: "Béni par les prêtres de l'aube, cet équipement amplifie les soins et la précision de son porteur."
    name_translations:
      en: "Sacred Dawn Set"
    description_translations:
      en: "Blessed by the priests of dawn, this gear amplifies the bearer's healing and precision."
    bonuses:
      - { required_pieces: 2, bonus_type: 'heal', bonus_value: 12 }
      - { required_pieces: 4, bonus_type: 'hit', bonus_value: 10 }
      - { required_pieces: 6, bonus_type: 'life', bonus_value: 30 }
    items:
      - '@t3_light_sword'
      - '@t3_light_shield'
      - '@t3_light_helmet'
      - '@t3_light_chest'
      - '@t3_light_legs'
      - '@t3_light_boots'
      - '@t3_light_gloves'

  # === Set Tier 3 — Abysses Éternelles (Ombre) — dégâts & drain ===
  set_eternal_abyss:
    slug: 'eternal-abyss'
    name: "Set des Abysses Éternelles"
    description: "Forgé dans les profondeurs du néant, cet équipement sombre amplifie la puissance destructrice et draine la vie des ennemis."
    name_translations:
      en: "Eternal Abyss Set"
    description_translations:
      en: "Forged in the depths of the void, this dark gear amplifies destructive might and drains the life of enemies."
    bonuses:
      - { required_pieces: 2, bonus_type: 'damage', bonus_value: 8 }
      - { required_pieces: 4, bonus_type: 'heal', bonus_value: 8 }
      - { required_pieces: 6, bonus_type: 'critical', bonus_value: 15 }
    items:
      - '@t3_dark_sword'
      - '@t3_dark_shield'
      - '@t3_dark_helmet'
      - '@t3_dark_chest'
      - '@t3_dark_legs'
      - '@t3_dark_boots'
      - '@t3_dark_gloves'

# =============================================================================
# CI Pipeline — Amethyste-Idle
# =============================================================================
# Déclenchée sur chaque push et pull request.
# Étapes : Lint (PHP-CS-Fixer) → Analyse statique (PHPStan) → Tests (PHPUnit)
#          → Tests E2E (Panther) → Build Docker (validation de l'image de production)
# =============================================================================

name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call:  # Permet à d'autres workflows de réutiliser cette CI (deploy.yml)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  POSTGRES_DB: amethyste
  POSTGRES_USER: app
  POSTGRES_PASSWORD: test_password

jobs:
  # ---------------------------------------------------------------------------
  # 1. Vérification du style de code (PHP-CS-Fixer)
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (PHP-CS-Fixer)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: 1

      - name: Run PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  # ---------------------------------------------------------------------------
  # 2. Analyse statique (PHPStan)
  # ---------------------------------------------------------------------------
  phpstan:
    name: "Analyse statique (PHPStan)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: 1

      - name: Warmup Symfony cache (dev)
        run: php bin/console cache:warmup --env=dev
        env:
          DATABASE_URL: "postgresql://localhost/fake?serverVersion=17"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github
        env:
          DATABASE_URL: "postgresql://localhost/fake?serverVersion=17"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

  # ---------------------------------------------------------------------------
  # 3. Tests unitaires et d'intégration (PHPUnit)
  # ---------------------------------------------------------------------------
  tests:
    name: "Tests (PHPUnit)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: 1

      - name: Create test database
        run: php bin/console doctrine:database:create --env=test --if-not-exists
        env:
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox --exclude-group e2e --testsuite Unit,Functional
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"


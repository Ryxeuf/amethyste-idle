# =============================================================================
# CI Pipeline — Amethyste-Idle
# =============================================================================
# Déclenchée sur chaque push et pull request.
# Étapes : Lint (PHP-CS-Fixer) → Analyse statique (PHPStan) → Tests (PHPUnit)
#          → Tests E2E (Panther) → Build Docker (validation de l'image de production)
# =============================================================================

name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]
  workflow_call:  # Permet à d'autres workflows de réutiliser cette CI (deploy.yml)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  POSTGRES_DB: amethyste
  POSTGRES_USER: app
  POSTGRES_PASSWORD: test_password

jobs:
  # ---------------------------------------------------------------------------
  # 1. Vérification du style de code (PHP-CS-Fixer)
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (PHP-CS-Fixer)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: 1

      - name: Run PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  # ---------------------------------------------------------------------------
  # 2. Analyse statique (PHPStan)
  # ---------------------------------------------------------------------------
  phpstan:
    name: "Analyse statique (PHPStan)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: 1

      - name: Warmup Symfony cache (dev)
        run: php bin/console cache:warmup --env=dev
        env:
          DATABASE_URL: "postgresql://localhost/fake?serverVersion=17"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github
        env:
          DATABASE_URL: "postgresql://localhost/fake?serverVersion=17"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

  # ---------------------------------------------------------------------------
  # 3. Tests unitaires et d'intégration (PHPUnit)
  # ---------------------------------------------------------------------------
  tests:
    name: "Tests (PHPUnit)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: 1

      - name: Create test database
        run: php bin/console doctrine:database:create --env=test --if-not-exists
        env:
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

      - name: Install vendor assets (importmap)
        run: php bin/console importmap:install --env=test
        env:
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

      - name: Setup test schema and fixtures
        run: |
          php bin/console doctrine:schema:create --env=test
          php bin/console doctrine:fixtures:load --env=test --no-interaction
        env:
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"

      - name: Validate game state coherence
        run: |
          set +e
          php -d display_errors=1 -d error_reporting=E_ALL bin/console app:game:validate --env=test -vvv > /tmp/validate_output.txt 2>&1
          EXIT_CODE=$?
          cat /tmp/validate_output.txt
          if [ $EXIT_CODE -ne 0 ]; then
            LAST_LINES=$(tail -30 /tmp/validate_output.txt | tr '\n' ' | ' | head -c 500)
            echo "::error::game:validate exit $EXIT_CODE — $LAST_LINES"
            exit $EXIT_CODE
          fi
        env:
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"

      - name: Run PHPUnit with coverage
        run: vendor/bin/phpunit --testdox --exclude-group e2e --testsuite Unit,Functional,Integration --coverage-clover coverage.xml --coverage-text
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"
          PERF_MAX_RESPONSE_MS: "500"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 4. Tests end-to-end (Panther + Chrome headless)
  # ---------------------------------------------------------------------------
  e2e:
    name: "Tests E2E (Panther)"
    runs-on: ubuntu-latest
    needs: [tests]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          SYMFONY_SKIP_AUTO_SCRIPTS: 1

      - name: Install ChromeDriver
        run: vendor/bin/bdi detect drivers

      - name: Create .env.test.local for Panther server
        run: |
          echo 'DATABASE_URL="postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"' > .env.test.local
          echo 'MERCURE_URL=http://localhost/.well-known/mercure' >> .env.test.local
          echo 'MERCURE_PUBLIC_URL=http://localhost/.well-known/mercure' >> .env.test.local
          echo 'MERCURE_JWT_SECRET=test' >> .env.test.local
          echo 'MESSENGER_TRANSPORT_DSN=in-memory://' >> .env.test.local

      - name: Warmup Symfony cache, build assets
        run: |
          php bin/console tailwind:build --env=test
          php bin/console cache:warmup --env=test
          php bin/console assets:install public --env=test
        env:
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"

      - name: Setup test database
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:schema:create --env=test
          php bin/console doctrine:fixtures:load --env=test --no-interaction
        env:
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"

      - name: Run E2E tests
        run: vendor/bin/phpunit --testsuite E2E --testdox
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"
          PANTHER_NO_HEADLESS: 0
          PANTHER_CHROME_ARGUMENTS: "--disable-gpu --no-sandbox --disable-dev-shm-usage"

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: panther-screenshots
          path: var/error-screenshots/

  # ---------------------------------------------------------------------------
  # 5. Build Docker — validation de l'image de production (pas de push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: "Build Docker (validation)"
    runs-on: ubuntu-latest
    needs: [lint, phpstan, tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frankenphp_prod
          push: false
          load: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=prod

      - name: Smoke test — verify critical assets in image
        run: |
          docker run --rm ghcr.io/${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            test -f /app/assets/vendor/pixi-bundle.js \
            && echo "OK: pixi-bundle.js present" \
            || (echo "FAIL: pixi-bundle.js missing from image" && exit 1)

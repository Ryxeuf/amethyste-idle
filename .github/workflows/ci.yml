# =============================================================================
# CI Pipeline — Amethyste-Idle
# =============================================================================
# Déclenchée sur chaque push et pull request.
# Étapes : Lint (PHP-CS-Fixer) → Analyse statique (PHPStan) → Tests (PHPUnit)
#          → Build Docker (validation de l'image de production)
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_call:  # Permet à d'autres workflows de réutiliser cette CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  POSTGRES_DB: amethyste_test
  POSTGRES_USER: app
  POSTGRES_PASSWORD: test_password

jobs:
  # ---------------------------------------------------------------------------
  # 1. Vérification du style de code (PHP-CS-Fixer)
  # ---------------------------------------------------------------------------
  lint:
    name: "Lint (PHP-CS-Fixer)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --format=github

  # ---------------------------------------------------------------------------
  # 2. Analyse statique (PHPStan)
  # ---------------------------------------------------------------------------
  phpstan:
    name: "Analyse statique (PHPStan)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Warmup Symfony cache (dev)
        run: php bin/console cache:warmup --env=dev
        env:
          DATABASE_URL: "postgresql://localhost/fake?serverVersion=17"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

  # ---------------------------------------------------------------------------
  # 3. Tests unitaires et d'intégration (PHPUnit)
  # ---------------------------------------------------------------------------
  tests:
    name: "Tests (PHPUnit)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: intl, pdo_pgsql, apcu, zip, pcntl
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@127.0.0.1:5432/${{ env.POSTGRES_DB }}?serverVersion=17&charset=utf8"
          MERCURE_URL: "http://localhost/.well-known/mercure"
          MERCURE_PUBLIC_URL: "http://localhost/.well-known/mercure"
          MERCURE_JWT_SECRET: "test"
          MESSENGER_TRANSPORT_DSN: "in-memory://"

  # ---------------------------------------------------------------------------
  # 4. Build de l'image Docker de production (validation)
  # ---------------------------------------------------------------------------
  docker-build:
    name: "Build Docker (prod)"
    runs-on: ubuntu-latest
    needs: [lint, phpstan, tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frankenphp_prod
          push: false
          tags: amethyste-idle:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=prod

# =============================================================================
# Auto-Merge Pipeline — Amethyste-Idle
# =============================================================================
# Merge automatique des PRs vers main quand la CI passe.
#
# Prérequis :
#   - Secret PAT_AUTO_MERGE (PAT avec droits repo) — recommandé pour bypass
#     les branch protection rules. Si absent, utilise le GITHUB_TOKEN par défaut.
#   - Branch protection sur main : exiger que les status checks passent
# =============================================================================

name: Auto-Merge

on:
  # Déclenché quand le workflow CI se termine
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Auto-merge des PRs quand la CI passe
  # ---------------------------------------------------------------------------
  auto-merge-pr:
    name: "Auto-merge PR"
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find associated PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_AUTO_MERGE || github.token }}
          script: |
            const headBranch = context.payload.workflow_run.head_branch;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`,
              base: 'main',
            });

            if (pulls.length === 0) {
              console.log(`Aucune PR ouverte trouvée pour la branche ${headBranch} vers main`);
              return;
            }

            const pr = pulls[0];
            console.log(`PR #${pr.number} trouvée: ${pr.title}`);
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_found', 'true');

      - name: Merge PR
        id: merge-pr
        if: steps.find-pr.outputs.pr_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_AUTO_MERGE || github.token }}
          script: |
            const prNumber = ${{ steps.find-pr.outputs.pr_number || 0 }};
            if (prNumber === 0) return;

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log(`PR #${prNumber} mergée avec succès !`);
              core.setOutput('merged', 'true');
            } catch (error) {
              core.setFailed(`Impossible de merger la PR #${prNumber}: ${error.message}`);
            }

      # Le merge squash dans main déclenche automatiquement release.yml
      # via son trigger `on: push: branches: [main]`. Pas besoin de
      # workflow_dispatch (qui nécessiterait un PAT avec actions:write).

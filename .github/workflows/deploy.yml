# =============================================================================
# CD Pipeline — Deploiement automatique sur le serveur de production
# =============================================================================
#
# Declenchee automatiquement quand semantic-release publie une nouvelle release.
# Peut aussi etre lance manuellement via workflow_dispatch (rollback, re-deploy).
#
# Prerequis (GitHub Secrets a configurer) :
#   - DEPLOY_HOST        : IP ou hostname du serveur (ex: amethyste.best)
#   - DEPLOY_USER        : Utilisateur SSH (ex: deploy)
#   - DEPLOY_SSH_KEY     : Cle privee SSH (ed25519 recommandee)
#   - DEPLOY_PATH        : Chemin du projet sur le serveur (ex: /opt/amethyste-idle)
#   - DEPLOY_SSH_PORT    : Port SSH (optionnel, defaut 22)
#
# Flux :
#   push main -> release.yml (CI + semantic-release + Docker push)
#            -> release publiee -> deploy.yml (ce fichier)
#
# =============================================================================

name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version a deployer (ex: v1.2.3). Defaut: latest release."
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy to production"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://amethyste.best

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "Deploiement manuel: ${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
            echo "Deploiement automatique: ${{ github.event.release.tag_name }}"
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "Deploiement: latest"
          fi

      - name: Configure SSH
        env:
          RAW_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          SSH_PORT="${RAW_PORT:-22}"
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Login to GHCR on server
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          RAW_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SSH_PORT="${RAW_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" \
            "echo '${GHCR_TOKEN}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          RAW_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_VERSION: ${{ steps.version.outputs.tag }}
        run: |
          SSH_PORT="${RAW_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" << DEPLOY_SCRIPT
            set -euo pipefail

            echo "========================================="
            echo " Deploiement Amethyste-Idle"
            echo " Version: ${DEPLOY_VERSION}"
            echo " Date: \$(date '+%Y-%m-%d %H:%M:%S')"
            echo " Commit: ${{ github.sha }}"
            echo "========================================="

            cd ${{ secrets.DEPLOY_PATH }}

            # Sauvegarder le commit actuel pour rollback eventuel
            PREVIOUS_COMMIT=\$(git rev-parse HEAD)
            echo "Commit precedent: \${PREVIOUS_COMMIT}"

            # Pull des modifications
            echo ""
            echo "==> Pull des modifications..."
            git fetch origin main
            git reset --hard origin/main

            # Executer le script de deploiement (pull image GHCR + restart)
            echo ""
            echo "==> Lancement du deploiement..."
            ./scripts/deploy.sh --prod

            echo ""
            echo "========================================="
            echo " Deploiement termine avec succes!"
            echo " Version: ${DEPLOY_VERSION}"
            echo " Commit: \$(git rev-parse HEAD)"
            echo "========================================="
          DEPLOY_SCRIPT

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          RAW_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          SSH_PORT="${RAW_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" << 'VERIFY_SCRIPT'
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Verification des conteneurs..."
            docker compose -f compose.yaml -f compose.prod.yaml ps

            echo ""
            echo "==> Health check..."
            for i in $(seq 1 30); do
              if docker compose -f compose.yaml -f compose.prod.yaml exec -T php curl -sf http://localhost:2019/metrics > /dev/null 2>&1; then
                echo "Health check OK!"
                exit 0
              fi
              echo "  Tentative ${i}/30..."
              sleep 2
            done

            echo "ERREUR: Health check echoue apres 60 secondes"
            exit 1
          VERIFY_SCRIPT

      - name: Deploy summary
        if: success()
        run: |
          echo "### Deploiement reussi" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://amethyste.best" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Le deploiement a echoue! Verifiez les logs ci-dessus."
          echo "Pour un rollback manuel, connectez-vous au serveur et executez:"
          echo "  cd ${{ secrets.DEPLOY_PATH }}"
          echo "  git reset --hard <commit-precedent>"
          echo "  ./scripts/deploy.sh --prod"

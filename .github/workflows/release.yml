# =============================================================================
# Release Pipeline — Semantic Release + Docker Push
# =============================================================================
#
# Declenchee apres un push sur main (apres merge de PR).
# Etapes :
#   1. CI complete (lint, phpstan, tests, build Docker validation)
#   2. Semantic Release (analyse des commits, creation tag + GitHub Release)
#   3. Build et push de l'image Docker vers GHCR (tags: latest, vX.Y.Z, sha)
#
# Le workflow deploy.yml se declenche automatiquement via l'evenement release.
# =============================================================================

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. CI — Validation complete
  # ---------------------------------------------------------------------------
  ci:
    name: "CI"
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      packages: read

  # ---------------------------------------------------------------------------
  # 2. Semantic Release — Tag + GitHub Release + Release Notes
  # ---------------------------------------------------------------------------
  release:
    name: "Semantic Release"
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          if [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            echo "### 🏷️ Release v${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
            echo "Type: ${{ steps.semantic.outputs.new_release_type }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Pas de nouvelle release" >> $GITHUB_STEP_SUMMARY
            echo "Aucun commit de type feat/fix/refactor/perf depuis la derniere release." >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # 3. Docker Build + Push — Uniquement si nouvelle release
  # ---------------------------------------------------------------------------
  docker-push:
    name: "Docker Push"
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frankenphp_prod
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:v${{ needs.release.outputs.new_release_version }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=prod
            APP_VERSION=${{ needs.release.outputs.new_release_version }}

      - name: Push summary
        run: |
          echo "### Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.IMAGE_NAME }}:v${{ needs.release.outputs.new_release_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

services:
  php: &php_base
    image: ${IMAGES_PREFIX:-}app-php
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-amethyste}?serverVersion=${POSTGRES_VERSION:-17}&charset=${POSTGRES_CHARSET:-utf8}
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://${SERVER_NAME:-localhost}/.well-known/mercure}
      MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      SYMFONY_VERSION: ${SYMFONY_VERSION:-}
      STABILITY: ${STABILITY:-stable}
      SYMFONY_TRUSTED_PROXIES: REMOTE_ADDR
      SYMFONY_TRUSTED_HEADERS: x-forwarded-for,x-forwarded-host,x-forwarded-proto,x-forwarded-port
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - traefik-network
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      # Service commun
      - "traefik.http.services.amethyste.loadbalancer.server.port=80"
      # Site public : amethyste.best + amethyste.ryxeuf.fr
      - "traefik.http.routers.amethyste-site.rule=Host(`amethyste.best`) || Host(`amethyste.ryxeuf.fr`)"
      - "traefik.http.routers.amethyste-site.entrypoints=websecure"
      - "traefik.http.routers.amethyste-site.tls=true"
      - "traefik.http.routers.amethyste-site.tls.certresolver=letsencrypt"
      - "traefik.http.routers.amethyste-site.tls.domains[0].main=amethyste.best"
      - "traefik.http.routers.amethyste-site.tls.domains[1].main=amethyste.ryxeuf.fr"
      - "traefik.http.routers.amethyste-site.service=amethyste"
      - "traefik.http.routers.amethyste-site.middlewares=secure-headers@file"
      # Game (mode connecté) : game.amethyste.best
      - "traefik.http.routers.amethyste-game.rule=Host(`game.amethyste.best`)"
      - "traefik.http.routers.amethyste-game.entrypoints=websecure"
      - "traefik.http.routers.amethyste-game.tls=true"
      - "traefik.http.routers.amethyste-game.tls.certresolver=letsencrypt"
      - "traefik.http.routers.amethyste-game.service=amethyste"
      - "traefik.http.routers.amethyste-game.middlewares=secure-headers@file"
      # API : api.amethyste.best
      - "traefik.http.routers.amethyste-api.rule=Host(`api.amethyste.best`)"
      - "traefik.http.routers.amethyste-api.entrypoints=websecure"
      - "traefik.http.routers.amethyste-api.tls=true"
      - "traefik.http.routers.amethyste-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.amethyste-api.service=amethyste"
      - "traefik.http.routers.amethyste-api.middlewares=secure-headers@file"
    depends_on:
      database:
        condition: service_healthy

  watcher_async_move_consumer:
    <<: *php_base
    container_name: amethyste-watcher-async-move-consumer
    links:
      - php
    tty: true
    ports: []
    labels: []
    entrypoint: ['php', '/app/bin/console', 'messenger:consume', 'async_movement', '-vv']
    depends_on:
      php:
        condition: service_healthy

  database:
    restart: unless-stopped
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amethyste}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-amethyste}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:
  database_data:

networks:
  traefik-network:
    external: true
  internal:
    driver: bridge

framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        # failure_transport: failed

        transports:
            async_movement: 'sync://'
            # Production: uncomment below and comment the sync transport above,
            # then run a Messenger worker: bin/console messenger:consume async_movement
            # async_movement:
            #     dsn: 'doctrine://default?queue_name=movement'

        routing:
            'App\GameEngine\Movement\Message\PlayerMoveMessage': async_movement

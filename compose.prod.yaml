services:
  php:
    build:
      context: .
      target: frankenphp_prod
    environment:
      APP_SECRET: ${APP_SECRET:-e454dd0213910bb338128f1a8306c1caa01114e1c30748e3882eb72ba4c117e7}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET}
      # Mouvements en file : la requête /api/map/move répond tout de suite, le worker traite en arrière-plan.
      MESSENGER_ASYNC_MOVEMENT_DSN: doctrine://default?queue_name=movement
  watcher_async_move_consumer:
    environment:
      MESSENGER_ASYNC_MOVEMENT_DSN: doctrine://default?queue_name=movement
